name: Deploy Pages demo

on:
  push:
    branches: [main]

# One Pages deployment at a time. Don't cancel an in-flight deploy (let it
# finish); queued runs collapse to the latest.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Gate the demo on the same lint/test/build as everything else, so a broken
  # main never publishes.
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build the harness (static site)
        run: npm run build:pages

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pages

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
