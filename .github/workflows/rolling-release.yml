name: Rolling Release

on:
  push:
    branches: [main]

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate checksums
        run: cd dist && sha256sum byom-player.js > checksums.txt

      - name: Delete existing rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true

      - name: Publish rolling release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Rolling Release (latest)
          prerelease: true
          files: |
            dist/byom-player.js
            dist/checksums.txt
          body: |
            Rolling build of the `<byom-player>` ES module from the latest `main`
            (commit ${{ github.sha }}).

            Drop-in usage:
            ```html
            <script type="module"
              src="https://github.com/lmorchard/byom-player/releases/download/latest/byom-player.js"></script>
            <byom-player src="/playlist.jspf.json" provider="subsonic"></byom-player>
            ```
