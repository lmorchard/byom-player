name: Rolling Release

on:
  push:
    branches: [main]

# Serialize rolling-release runs. Two pushes to main close together (e.g. merging
# two PRs) otherwise start overlapping runs that race to force-push the `dist`
# branch, and one is rejected ("cannot lock ref 'refs/heads/dist'"). Cancelling
# the in-progress run means the newest commit wins and only one push happens.
concurrency:
  group: rolling-release
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate checksums
        run: cd dist && sha256sum byom-player.js > checksums.txt

      - name: Publish build to the dist branch (served by jsDelivr)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd dist
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -q -b dist
          git add byom-player.js checksums.txt
          git commit -q -m "Rolling build ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" dist:dist

      - name: Delete existing rolling release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true

      - name: Publish rolling release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Rolling Release (latest)
          prerelease: true
          files: |
            dist/byom-player.js
            dist/checksums.txt
          body: |
            Rolling build of the `<byom-player>` ES module from the latest `main`
            (commit ${{ github.sha }}).

            The attached `byom-player.js` is a download for self-hosting. For a
            live `<script>` tag, load it via jsDelivr (correct MIME + CORS) from
            the `dist` branch:
            ```html
            <script type="module"
              src="https://cdn.jsdelivr.net/gh/lmorchard/byom-player@dist/byom-player.js"></script>
            <byom-player src="/playlist.jspf.json" provider="subsonic"></byom-player>
            ```
