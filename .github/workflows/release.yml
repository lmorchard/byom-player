name: Release

# Cut an immutable, versioned release on a semver tag. Unlike the rolling `dist`
# branch (mutable, jsDelivr-cache-prone), a published npm version is permanent,
# so `https://cdn.jsdelivr.net/npm/byom-player@<version>/dist/byom-player.js`
# never goes stale. Consumers pin that URL instead of `@dist`.
#
# To release:
#   1. Bump "version" in package.json (e.g. 1.0.0) and merge to main.
#   2. Tag the merge commit `v1.0.0` and push the tag.
# The tag must match package.json's version, or this workflow fails fast.
#
# Requires an `NPM_TOKEN` repository secret (an npm automation token with
# publish rights to the `byom-player` package).

on:
  push:
    tags: ['v*']

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::tag v$tag does not match package.json version $pkg — bump package.json and retag"
            exit 1
          fi
          echo "version=$pkg" >> "$GITHUB_OUTPUT"
        id: version

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Generate checksums
        run: cd dist && sha256sum byom-player.js > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: byom-player ${{ github.ref_name }}
          files: |
            dist/byom-player.js
            dist/checksums.txt
          body: |
            `<byom-player>` ${{ github.ref_name }} — published to npm.

            Load the immutable, versioned ES module via jsDelivr (correct MIME +
            CORS, never cache-stale because the version is permanent):
            ```html
            <script type="module"
              src="https://cdn.jsdelivr.net/npm/byom-player@${{ steps.version.outputs.version }}/dist/byom-player.js"></script>
            <byom-player src="/playlist.jspf.json" provider="subsonic"></byom-player>
            ```

            The attached `byom-player.js` is a download for self-hosting.
